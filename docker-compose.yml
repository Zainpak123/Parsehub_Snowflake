services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile-backend
    container_name: parsehub-backend
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
    networks:
      - parsehub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile-frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://backend:5000
    container_name: parsehub-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - NODE_ENV=production
      - BACKEND_API_URL=http://backend:5000
      - PORT=3000
    networks:
      - parsehub
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  parsehub:
    driver: bridge