---
# Snowflake Database Credentials
# !!! IMPORTANT: Create this manually with kubectl create secret !!!
# DO NOT commit real credentials to this file!
apiVersion: v1
kind: Secret
metadata:
  name: snowflake-credentials
  namespace: parsehub
type: Opaque
stringData:
  account: "CHANGE_ME"  # e.g., VFHSGYP-GD78100
  user: "CHANGE_ME"
  password: "CHANGE_ME"
  warehouse: "CHANGE_ME"
  database: "CHANGE_ME"
  schema: "CHANGE_ME"

---
# ParseHub API Key
apiVersion: v1
kind: Secret
metadata:
  name: parsehub-api-key
  namespace: parsehub
type: Opaque
stringData:
  api-key: "CHANGE_ME"
