apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Use local Docker Desktop images (no registry)
images:
  - name: parsehub-backend
    newName: parsehub-backend
    newTag: latest
  - name: parsehub-frontend
    newName: parsehub-frontend
    newTag: latest

patches:
  - path: backend-patch.yaml
  - path: frontend-patch.yaml
  - path: configmap-patch.yaml

commonLabels:
  environment: docker-desktop
